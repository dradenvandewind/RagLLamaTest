version: "3.9"

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    user: root
    container_name: rag-llamaindex
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      EMBED_MODEL: ${EMBED_MODEL:-intfloat/multilingual-e5-small}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-64}
      CHROMA_PATH: /app/chroma_db
      WORKERS: ${WORKERS:-4}
      YT_DLP_JS_RUNTIMES: nodejs
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      YOUTUBE_TOKEN_PATH: /app/youtube_token.json
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      ANONYMIZED_TELEMETRY: False

    volumes:
      - chroma_data:/app/chroma_db
      - ./data:/app/data:ro
      - ~/.mozilla/firefox:/root/.mozilla/firefox:ro
      - ./youtube_token.json:/app/youtube_token.json:ro
      - hf_cache:/root/.cache/huggingface

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - ollama
    networks:
      - rag-net

  ollama:
    image: ollama/ollama
    environment:
      - OLLAMA_NUM_CTX=2048
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - rag-net
    entrypoint: ["/bin/sh", "-c", "ollama serve & pid=$! && sleep 5 && ollama pull llama3.2:1b && echo 'FROM llama3.2:1b\nPARAMETER num_ctx 2048' | ollama create llama3.2:1b-ctx2k -f - && wait $pid"]

volumes:
  chroma_data:
    driver: local
  hf_cache:
    driver: local
  ollama_data:
    driver: local

networks:
  rag-net:
    driver: bridge